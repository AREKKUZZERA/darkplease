name: Run code tests on Pull Request or Push

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'src/config/*'
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - 'src/config/**'
  workflow_dispatch:
    inputs:
      node_version:
        description: 'NodeJS version'
        required: true
        default: '22.x'

jobs:
  test:
    name: Run tests
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:

      - name: Clone repository
        uses: actions/checkout@v6

      - name: Node setup
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version || '22.x' }}
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Lint code for code-style errors
        run: npm run lint

      - name: Check for compatibility issues
        run: npm run lint:bundle

      - name: Check NPM dependencies
        run: node tests/dependencies.js
